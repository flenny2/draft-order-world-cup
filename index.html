  <meta property="og:description" content="The World Cup decides who drafts first. Live picks, schedule, bracket & what-ifs." />

  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <!-- Foil-plate mark (premium iconography — no emoji): inline SVG favicon + PNG for iOS home screen -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23efd98a'/><stop offset='.48' stop-color='%23c6a24c'/><stop offset='.5' stop-color='%23a07d2c'/><stop offset='1' stop-color='%23e6cf82'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='%230b3a34'/><rect x='10' y='10' width='44' height='44' rx='10' fill='url(%23g)'/><text x='32' y='45' text-anchor='middle' font-family='Arial Black,Impact,sans-serif' font-size='32' font-weight='900' fill='%233a2c07'>1</text></svg>" />

  <link rel="stylesheet" href="fonts.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app">
    <header class="site-header">
      <p class="eyebrow">2026 World Cup · Fantasy</p>
      <h1 class="wordmark">Draft&nbsp;<em>Order.</em></h1>
      <!-- Static on purpose: app.js handles [data-act] via document-level delegation,
           so this works without being re-rendered. -->
      <button data-act="theme" class="icon-btn theme-corner" title="Switch day / night theme" aria-label="Switch theme"><svg width="17" height="17" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><circle cx="8" cy="8" r="6.6" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8 1.4a6.6 6.6 0 0 1 0 13.2z" fill="currentColor"/></svg></button>
    </header>
    <!-- Rendered by app.js from engine output. No ruleset logic lives in the DOM. -->
    <div id="view"></div>
    <footer class="site-footer">
      <p id="last-updated"></p>
      <p class="phase-note">Scores sync live — no refresh needed.</p>
      <p class="foot-admin"><a href="#admin">Commissioner sign-in</a></p>
    </footer>
  </main>
