# CI: run the invariant harness + the simulation fuzzer on every push.
# No dependencies to install — vanilla ES modules, plain `node`.
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Invariant harness
        run: node engine.test.js
      - name: Simulation (fairness + process fuzz)
        run: node simulate.js
      - name: Poller planning functions
        run: node poller.test.js
